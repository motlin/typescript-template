# Jobs that run on merge_group, meaning they must pass before changes land. They also run on pull_request.

on:
    pull_request:
    merge_group:

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    pre-commit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                python-version: "3.x"
            - uses: jdx/mise-action@v4
            - run: npm ci
            - uses: pre-commit/action@v3.0.1

    oxlint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4

            - run: just oxlint

    biome:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4

            - run: just biome

    prettier:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4

            - run: just prettier

    typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4
            - run: just typecheck

    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4
            - run: just build

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4
            - run: just test

    all-checks:
        name: All checks
        if: ${{ !cancelled() }}
        needs: [pre-commit, oxlint, biome, prettier, typecheck, build, test]
        runs-on: ubuntu-latest
        steps:
            - uses: re-actors/alls-green@release/v1
              with:
                  jobs: ${{ toJSON(needs) }}
